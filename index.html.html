// ===== 구글시트 API =====
async function sheetGet(range){
  const url=`${BASE}/values/${encodeURIComponent(range)}?key=${API_KEY}`;
  const r=await fetch(url);
  if(!r.ok)throw new Error('시트 읽기 실패');
  const d=await r.json();
  return d.values||[];
}

async function sheetAppend(sheetName,values){
  // Apps Script 웹앱을 통해 저장 (CORS 우회, 쓰기 권한 확보)
  const r=await fetch(APPS_SCRIPT_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({sheet:sheetName,values:values[0]})
  });
  let result;
  try{result=await r.json();}catch(e){throw new Error('서버 응답 오류: '+(await r.text()).slice(0,200));}
  if(!result.success){throw new Error(result.error||'알 수 없는 오류');}
  return result;
}

function today(){
  const n=new Date();
  return`${n.getFullYear()}.${p2(n.getMonth()+1)}.${p2(n.getDate())}`;
}

// ===== 매출 이력 불러오기 =====
function parseNum(v){
  if(!v)return 0;
  return parseInt(String(v).replace(/[^0-9]/g,''))||0;
}

function formatComma(v){
  const n=parseNum(v);
  return n>0?n.toLocaleString('ko-KR'):'';
}

    }));

}

function getMonthKey(dateStr){
  // 날짜형식 YYYY.MM.DD
  const p=dateStr.split('.');
  return p.length>=2?`${p[0]}.${p[1]}`:dateStr;
}

function groupByMonth(history){
  const groups={};
  history.forEach(h=>{
    const mk=getMonthKey(h.date);
    if(!groups[mk])groups[mk]={total:0,visitors:0,buyers:0,days:0,items:[]};
    groups[mk].total+=h.total;
    groups[mk].visitors+=h.visitors;
    groups[mk].buyers+=h.buyers;
    groups[mk].days+=1;
    groups[mk].items.push(h);
  });
  return Object.entries(groups).sort((a,b)=>b[0].localeCompare(a[0]));
}

async function loadAttendance(shop){
  try{
    const rows=await sheetGet('근무확인!A2:F1000');
    const filtered=rows.filter(r=>r[2]===shop&&r[0]);
    // 날짜+이름 기준으로 출근/퇴근 합치기
    const byKey={};
    filtered.forEach(r=>{
      const key=r[0]+'_'+r[1];
      if(!byKey[key])byKey[key]={date:r[0],name:r[1],in:'',out:''};
      if(r[3])byKey[key].in=byKey[key].in?byKey[key].in:r[3];
      if(r[4])byKey[key].out=r[4];
    });
    S.attendanceHistory[shop]=Object.values(byKey).sort((a,b)=>b.date.localeCompare(a.date));
    S.attendanceLoaded[shop]=true;
  }catch(e){
    S.attendanceHistory[shop]=[];
    S.attendanceLoaded[shop]=true;
  }
}

function workMinutes(inT,outT){
  if(!inT||!outT)return null;
  const[ih,im]=inT.split(':').map(Number);
  const[oh,om]=outT.split(':').map(Number);
  if(isNaN(ih)||isNaN(oh))return null;
  return(oh*60+om)-(ih*60+im);
}

function fmtMinutes(mins){
  if(mins===null)return'-';
  const h=Math.floor(mins/60),m=mins%60;
  return`${h}시간${m>0?' '+m+'분':''}`;
}

function groupAttendanceByMonth(history){
  const groups={};
  history.forEach(h=>{
    const mk=getMonthKey(h.date);
    if(!groups[mk])groups[mk]={days:0,totalMin:0,items:[]};
    groups[mk].days+=1;
    const mins=workMinutes(h.in,h.out);
    if(mins!==null)groups[mk].totalMin+=mins;
    groups[mk].items.push(h);
  });
  return Object.entries(groups).sort((a,b)=>b[0].localeCompare(a[0]));
}

function renderSalesMonthly(shop){
  const history=S.salesHistory[shop]||[];
  const target=parseNum(S.monthlyTarget[shop]);
  const targetInputHtml=`
  <div class="card"><div class="card-header"><div class="card-title">${currentMonthKey()} 목표 매출</div></div><div class="card-body">
    <div class="sales-input-row">
      <div class="sales-input-label">이번 달 목표</div>
      <div style="display:flex;align-items:center;gap:5px">
        <input class="sales-input" type="text" inputmode="numeric" placeholder="0" value="${S.monthlyTarget[shop]}" oninput="setTarget('${shop}',this.value)">
        <span style="font-size:12px;color:#999;width:14px">원</span>
      </div>
    </div>
    <button class="cta-btn sec" style="margin-top:8px" onclick="saveTarget('${shop}')"><i class="ti ti-target-arrow"></i> 목표 저장</button>
  </div></div>`;

  if(!history.length){
    return targetInputHtml+`<div class="card"><div class="card-body"><div style="padding:20px 0;text-align:center;color:#bbb;font-size:13px">아직 저장된 매출 데이터가 없습니다</div></div></div>`;
  }
  const grouped=groupByMonth(history);
  const thisMonthEntry=grouped.find(([m])=>m===currentMonthKey());
  const thisMonthTotal=thisMonthEntry?thisMonthEntry[1].total:0;
  const pct=target>0?Math.min(999,Math.round(thisMonthTotal/target*100)):0;

  return`
  ${targetInputHtml}
  ${target>0?`
  <div class="card"><div class="card-header"><div class="card-title">${currentMonthKey()} 목표 달성률</div></div><div class="card-body">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
      <span style="font-size:22px;font-weight:700;color:${SHOP_COLOR[shop]}">${pct}%</span>
      <span style="font-size:12px;color:#999">${thisMonthTotal.toLocaleString('ko-KR')}원 / ${target.toLocaleString('ko-KR')}원</span>
    </div>
    <div style="width:100%;height:8px;background:#f0ede8;border-radius:6px;overflow:hidden">
      <div style="width:${Math.min(100,pct)}%;height:100%;background:${SHOP_COLOR[shop]};border-radius:6px;transition:width .3s"></div>
    </div>
    ${pct>=100?`<div style="font-size:12px;color:#2d7a3a;margin-top:6px;font-weight:500">🎉 목표 달성!</div>`:
    `<div style="font-size:12px;color:#999;margin-top:6px">목표까지 ${(target-thisMonthTotal).toLocaleString('ko-KR')}원 남음</div>`}
  </div></div>`:''}
  <div class="card"><div class="card-header">
    <div class="card-title">${shop}점 · 월별 매출</div>
  </div><div class="card-body">
    ${grouped.map(([month,g])=>{
      const avg=g.days>0?Math.round(g.total/g.days):0;
      const cvr=g.visitors>0?Math.round(g.buyers/g.visitors*100):0;
      const isThisMonth=month===currentMonthKey();
      return`
      <div class="summary-row" style="align-items:flex-start">
        <div>
          <div style="font-size:13px;font-weight:600">${month}${isThisMonth?' (이번달)':''}</div>
          <div style="font-size:11px;color:#999;margin-top:2px">${g.days}일 입력 · 일평균 ${avg.toLocaleString('ko-KR')}원</div>
          ${g.visitors?`<div style="font-size:11px;color:#999">방문 ${g.visitors}명 · 전환율 ${cvr}%</div>`:''}
        </div>
        <div style="font-size:16px;font-weight:700;color:${SHOP_COLOR[shop]}">${g.total.toLocaleString('ko-KR')}원</div>
      </div>`;}).join('')}
  </div></div>`;
}

async function toggleCheck(shop,type,i){
  S.checks[shop][type][i]=!S.checks[shop][type][i];
  const item=type==='open'?OPEN_CHECKS[i]:CLOSE_CHECKS[i];
  document.getElementById('mc').innerHTML=renderChecklist();
  startClock();
  await saveChecklist(shop,type,item,S.checks[shop][type][i]);
}

async function punch(){
  const now=new Date();
  const t=`${p2(now.getHours())}:${p2(now.getMinutes())}`;
  if(!S.clockedIn){S.punchIn=t;S.clockedIn=true;await savePunch('in',t);}
  else{S.punchOut=t;S.clockedIn=false;await savePunch('out',t);}
  S.attendanceLoaded[S.user.showroom]=false;
  document.getElementById('mc').innerHTML=renderChecklist();startClock();
}

function p2(n){return String(n).padStart(2,'0');}
function startClock(){
  clearInterval(window._clk);
  window._clk=setInterval(()=>{
    const el=document.getElementById('clock');
    if(!el){clearInterval(window._clk);return;}
    const now=new Date();el.textContent=`${p2(now.getHours())}:${p2(now.getMinutes())}`;
  },1000);
}
