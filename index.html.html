// ===== 유틸 =====
function p2(n){return String(n).padStart(2,'0');}
function today(){const n=new Date();return`${n.getFullYear()}.${p2(n.getMonth()+1)}.${p2(n.getDate())}`;}
function todayDisplay(){
  const n=new Date();const days=['일','월','화','수','목','금','토'];
  return`${n.getFullYear()}.${p2(n.getMonth()+1)}.${p2(n.getDate())} (${days[n.getDay()]})`;
}
function currentMonthKey(){const n=new Date();return`${n.getFullYear()}.${p2(n.getMonth()+1)}`;}
function getMonthKey(dateStr){const p=dateStr.split('.');return p.length>=2?`${p[0]}.${p[1]}`:dateStr;}
function parseNum(v){if(!v)return 0;return parseInt(String(v).replace(/[^0-9]/g,''))||0;}
function formatComma(v){const n=parseNum(v);return n>0?n.toLocaleString('ko-KR'):'';}
function isAdmin(){return S.user&&S.user.role==='관리자';}
function userShop(){return S.user?S.user.showroom:'';}

  if(!r.ok)throw new Error('시트 읽기 실패');
  const d=await r.json();
  return d.values||[];
}

// ===== 구글시트 쓰기 (Apps Script 경유) =====
// action: append(추가) / update(특정 행 수정)
async function sheetWrite(payload){
  const r=await fetch(APPS_SCRIPT_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(payload)
  });
  let result;
  try{result=await r.json();}catch(e){throw new Error('서버 응답 오류: '+(await r.text()).slice(0,200));}
  if(!result.success){throw new Error(result.error||'알 수 없는 오류');}
  return result;
}
async function sheetAppend(sheetName,values){
  return sheetWrite({action:'append',sheet:sheetName,values:values[0]});
}
async function sheetUpdateRow(sheetName,rowNumber,values){
  return sheetWrite({action:'update',sheet:sheetName,row:rowNumber,values:values});
}

function calcTotal(d){return parseNum(d.card)+parseNum(d.terminal)+parseNum(d.transfer)+parseNum(d.cash);}
function calcRefund(d){return parseNum(d.refundCard)+parseNum(d.refundTerminal)+parseNum(d.refundTransfer)+parseNum(d.refundCash);}
function calcNetTotal(d){return calcTotal(d)-calcRefund(d);}

      };

function groupByMonth(history){
  const groups={};
  history.forEach(h=>{
    const mk=getMonthKey(h.date);
    if(!groups[mk])groups[mk]={total:0,visitors:0,buyers:0,days:0,items:[]};
    groups[mk].total+=h.total;groups[mk].visitors+=h.visitors;groups[mk].buyers+=h.buyers;
    groups[mk].days+=1;groups[mk].items.push(h);
  });
  return Object.entries(groups).sort((a,b)=>b[0].localeCompare(a[0]));
}

async function loadAttendance(shop){
  try{
    const rows=await sheetGet('근무확인!A2:F1000');
    const filtered=rows.filter(r=>r[2]===shop&&r[0]);
    const byKey={};
    filtered.forEach((r,idx)=>{
      const key=r[0]+'_'+r[1];
      if(!byKey[key])byKey[key]={date:r[0],name:r[1],in:'',out:'',rowNum:idx+2};
      if(r[3])byKey[key].in=byKey[key].in||r[3];
      if(r[4])byKey[key].out=r[4];
      byKey[key].rowNum=idx+2;
    });
    S.attendanceHistory[shop]=Object.values(byKey).sort((a,b)=>b.date.localeCompare(a.date));
    S.attendanceLoaded[shop]=true;
  }catch(e){S.attendanceHistory[shop]=[];S.attendanceLoaded[shop]=true;}
}
async function loadMyPunchStatus(){
  try{
    const rows=await sheetGet('근무확인!A2:F1000');
    const t=today();
    const mine=rows.filter(r=>r[0]===t&&r[1]===S.user.name);
    if(mine.length){
      const last=mine[mine.length-1];
      S.punchIn=last[3]||S.punchIn;
      S.punchOut=last[4]||null;
      S.clockedIn=!!(S.punchIn&&!S.punchOut);
    }
    S.punchLoaded=true;
  }catch(e){S.punchLoaded=true;}
}
function workMinutes(inT,outT){
  if(!inT||!outT)return null;
  const[ih,im]=inT.split(':').map(Number);const[oh,om]=outT.split(':').map(Number);
  if(isNaN(ih)||isNaN(oh))return null;
  return(oh*60+om)-(ih*60+im);
}
function fmtMinutes(mins){if(mins===null)return'-';const h=Math.floor(mins/60),m=mins%60;return`${h}시간${m>0?' '+m+'분':''}`;}
function groupAttendanceByMonth(history){
  const groups={};
  history.forEach(h=>{
    const mk=getMonthKey(h.date);
    if(!groups[mk])groups[mk]={days:0,totalMin:0,items:[]};
    groups[mk].days+=1;
    const mins=workMinutes(h.in,h.out);
    if(mins!==null)groups[mk].totalMin+=mins;
    groups[mk].items.push(h);
  });
  return Object.entries(groups).sort((a,b)=>b[0].localeCompare(a[0]));
}
async function savePunch(type,time){
  await sheetAppend('근무확인',[[today(),S.user.name,S.user.showroom,type==='in'?time:'',type==='out'?time:'','']]);
}
async function punch(){
  const now=new Date();const t=`${p2(now.getHours())}:${p2(now.getMinutes())}`;
  try{
    if(!S.clockedIn){S.punchIn=t;S.clockedIn=true;await savePunch('in',t);}
    else{S.punchOut=t;S.clockedIn=false;await savePunch('out',t);}
    S.attendanceLoaded[S.user.showroom]=false;
  }catch(e){alert('출퇴근 기록 저장 실패: '+e.message);}
  document.getElementById('mc').innerHTML=renderChecklist();startClock();
}

async function loadChecklist(shop){
  try{
    const rows=await sheetGet(`체크리스트_${shop}!A2:F2000`);
    const t=today();
    const todayRows=rows.filter(r=>r[0]===t);
    const open=Array(OPEN_CHECKS.length).fill(false);
    const close=Array(CLOSE_CHECKS.length).fill(false);
    todayRows.forEach(r=>{
      const list=r[1]==='오픈'?OPEN_CHECKS:CLOSE_CHECKS;
      const arr=r[1]==='오픈'?open:close;
      const idx=list.indexOf(r[2]);
      if(idx>-1)arr[idx]=r[3]==='완료';
    });
    S.checks[shop]={open,close};
    S.checksLoaded[shop]=true;
  }catch(e){S.checksLoaded[shop]=true;}
}

  await sheetAppend(`체크리스트_${shop}`,[[today(),type==='open'?'오픈':'마감',item,done?'완료':'취소',new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),S.user.name]]);
}

async function saveSales(shop){
  const d=S.salesData[shop];
  const total=calcTotal(d);
  const refund=calcRefund(d);
  if(total===0&&refund===0){alert('카드/단말기/계좌이체/현금 중 하나 이상 입력해주세요.');return;}
  S.syncStatus='saving';
  document.getElementById('mc').innerHTML=renderSales();
  try{
    const vis=parseInt(d.visitors)||0;const buy=parseInt(d.buyers)||0;
    const cvr=vis>0?Math.round(buy/vis*100)+'%':'';
    const netTotal=total-refund;
    const row=[today(),netTotal,d.card,d.terminal,d.transfer,d.cash,d.refundCard,d.refundTerminal,d.refundTransfer,d.refundCash,d.visitors,d.buyers,cvr,d.special,S.user.name];
    if(S.todaySavedRow[shop]){
      await sheetUpdateRow(`매출_${shop}`,S.todaySavedRow[shop],row);
    }else{
      await sheetAppend(`매출_${shop}`,[row]);
    }
    S.syncStatus='done';
    S.salesHistoryLoaded[shop]=false;
    await loadSalesHistory(shop);
    alert(`✅ ${shop}점 매출이 저장되었습니다!`);
  }catch(e){
    S.syncStatus='err';
    alert('저장 실패: '+e.message);
  }
  document.getElementById('mc').innerHTML=renderSales();
}

    <div class="shop-tab ${S.salesView==='input'?'active-all':''}" onclick="setSalesView('input')">입력</div>
    <div class="shop-tab ${S.salesView==='daily'?'active-all':''}" onclick="setSalesView('daily')">일별</div>

function setSalesView(v){
  S.salesView=v;
  const shop=S.activeShop.sales;
  const needsTarget=(v==='monthly')&&!S.targetLoaded[shop];
  if(needsTarget){
    document.getElementById('mc').innerHTML=`<div class="page-title">매출 현황</div><div class="loading">불러오는 중...</div>`;
    loadTarget(shop).then(()=>{document.getElementById('mc').innerHTML=renderSales();});
  }else{
    document.getElementById('mc').innerHTML=renderSales();
  }
}

  const refund=calcRefund(d);
  const netTotal=total-refund;
  const vis=parseInt(d.visitors)||0;const buy=parseInt(d.buyers)||0;
  const cvr=vis>0?Math.round(buy/vis*100):0;
  const isEdit=!!S.todaySavedRow[shop];
  return`
  <div class="card"><div class="card-header">
    <div class="card-title">${shop}점 · 오늘 매출 ${isEdit?'<span class="edit-badge">(저장됨 · 수정가능)</span>':''}</div>
    <span style="font-size:11px;color:#999">이지어드민 확인 후 입력</span>
  </div><div class="card-body">
    <div class="sales-input-row">
      <div class="sales-input-label" style="font-weight:600">총 매출 (환불 차감 후)</div>
      <div style="display:flex;align-items:center;gap:5px">
        <input class="sales-input readonly-total" type="text" value="${formatComma(netTotal)}" disabled>
        <span style="font-size:12px;color:#999;width:14px">원</span>
      </div>
    </div>
    ${refund>0?`<div class="sales-input-row"><div class="sales-input-label" style="color:#c62828">└ 환불 차감액</div>
      <div style="font-size:13px;font-weight:600;color:#c62828">- ${formatComma(refund)}원</div></div>`:''}
    ${[{key:'card',label:'카드'},{key:'terminal',label:'단말기'},{key:'transfer',label:'계좌이체'},{key:'cash',label:'현금'}].map(f=>`
    <div class="sales-input-row">
      <div class="sales-input-label">${f.label}</div>
      <div style="display:flex;align-items:center;gap:5px">
        <input class="sales-input" type="text" inputmode="numeric" placeholder="0" value="${formatComma(d[f.key])}" oninput="setSales('${shop}','${f.key}',this.value)">
        <span style="font-size:12px;color:#999;width:14px">원</span>
      </div>
    </div>`).join('')}
    <div class="sales-input-row"><div class="sales-input-label">방문객 수</div>
      <div style="display:flex;align-items:center;gap:5px">
        <input class="sales-input" type="text" inputmode="numeric" placeholder="0" value="${d.visitors}" oninput="setSalesText('${shop}','visitors',this.value.replace(/[^0-9]/g,''))" onblur="document.getElementById('mc').innerHTML=renderSales()">
        <span style="font-size:12px;color:#999;width:14px">명</span>
      </div>
    </div>
    <div class="sales-input-row"><div class="sales-input-label">구매객 수</div>
      <div style="display:flex;align-items:center;gap:5px">
        <input class="sales-input" type="text" inputmode="numeric" placeholder="0" value="${d.buyers}" oninput="setSalesText('${shop}','buyers',this.value.replace(/[^0-9]/g,''))" onblur="document.getElementById('mc').innerHTML=renderSales()">
        <span style="font-size:12px;color:#999;width:14px">명</span>
      </div>
    </div>
    <div class="sales-input-row"><div class="sales-input-label" style="color:#999">구매전환율</div>
      <div style="font-size:13px;font-weight:600;color:${SHOP_COLOR[shop]}">${vis>0?cvr+'%':'-'}</div>
    </div>
  </div></div>
  <div class="card"><div class="card-header"><div class="card-title">🔄 결제수단별 환불</div></div><div class="card-body">
    ${[{key:'refundCard',label:'카드 환불'},{key:'refundTerminal',label:'단말기 환불'},{key:'refundTransfer',label:'계좌이체 환불'},{key:'refundCash',label:'현금 환불'}].map(f=>`
    <div class="sales-input-row">
      <div class="sales-input-label" style="color:#c62828">${f.label}</div>
      <div style="display:flex;align-items:center;gap:5px">
        <input class="sales-input" type="text" inputmode="numeric" placeholder="0" value="${formatComma(d[f.key])}" oninput="setSales('${shop}','${f.key}',this.value)" style="border-color:#fce4ec">
        <span style="font-size:12px;color:#999;width:14px">원</span>
      </div>
    </div>`).join('')}
  </div></div>
  <div class="card"><div class="card-header"><div class="card-title">특이사항</div></div><div class="card-body">
    <textarea class="textarea" rows="3" placeholder="반품 사유 / 고객 문의 / 기타" oninput="setSalesText('${shop}','special',this.value)">${d.special}</textarea>

  <button class="cta-btn" onclick="saveSales('${shop}')"><i class="ti ti-send"></i> ${shop}점 ${isEdit?'매출 수정 저장':'마감 보고 저장'}</button>
  ${isAdmin()?`<div class="card"><div class="card-header"><div class="card-title">전체 요약 (오늘)</div></div><div class="card-body">
    ${SHOPS.map(s=>{const sd=S.salesData[s];const t=calcTotal(sd)-calcRefund(sd);return`
    <div class="summary-row">
      <div class="summary-shop"><div class="summary-dot" style="background:${SHOP_COLOR[s]}"></div><span style="font-size:13px">${s}점</span></div>

        <div style="font-size:13px;font-weight:600">${t!==0?formatComma(t)+'원':'미입력'}</div>
        ${sd.visitors?`<div style="font-size:11px;color:#999">방문 ${sd.visitors}명 / 구매 ${sd.buyers||0}명</div>`:''}

function renderSalesDaily(shop){
  const history=S.salesHistory[shop]||[];
  if(!history.length)return`<div class="card"><div class="card-body"><div style="padding:20px 0;text-align:center;color:#bbb;font-size:13px">아직 저장된 매출 데이터가 없습니다</div></div></div>`;
  const sorted=[...history].sort((a,b)=>b.date.localeCompare(a.date));
  return`<div class="card"><div class="card-header"><div class="card-title">${shop}점 · 일별 매출</div><span style="font-size:11px;color:#999">최근 ${sorted.length}건</span></div><div class="card-body">
    ${sorted.map(h=>{
      const refundTotal=(h.refundCard||0)+(h.refundTerminal||0)+(h.refundTransfer||0)+(h.refundCash||0);
      return`<div class="summary-row" style="align-items:flex-start">
      <div><div style="font-size:13px;font-weight:500">${h.date}${h.date===today()?' (오늘)':''}</div>
        ${h.visitors?`<div style="font-size:11px;color:#999;margin-top:2px">방문 ${h.visitors}명 · 구매 ${h.buyers}명${h.cvr?' · 전환율 '+h.cvr:''}</div>`:''}
        ${refundTotal>0?`<div style="font-size:11px;color:#c62828;margin-top:2px">환불 ${refundTotal.toLocaleString('ko-KR')}원</div>`:''}
        ${h.special?`<div style="font-size:11px;color:#999;margin-top:2px">${h.special}</div>`:''}
      </div>
      <div style="font-size:14px;font-weight:600;color:${SHOP_COLOR[shop]}">${h.total.toLocaleString('ko-KR')}원</div>
    </div>`;}).join('')}
  </div></div>`;
}

function renderSalesMonthly(shop){
  const history=S.salesHistory[shop]||[];
  const target=parseNum(S.monthlyTarget[shop]);
  const targetInputHtml=`<div class="card"><div class="card-header"><div class="card-title">${currentMonthKey()} 목표 매출</div></div><div class="card-body">
    <div class="sales-input-row"><div class="sales-input-label">이번 달 목표</div>
      <div style="display:flex;align-items:center;gap:5px">
        <input class="sales-input" type="text" inputmode="numeric" placeholder="0" value="${formatComma(S.monthlyTarget[shop])}" oninput="setTarget('${shop}',this.value)">
        <span style="font-size:12px;color:#999;width:14px">원</span>
      </div></div>
    <button class="cta-btn sec" style="margin-top:8px" onclick="saveTarget('${shop}')"><i class="ti ti-target-arrow"></i> 목표 저장</button>
  </div></div>`;
  if(!history.length)return targetInputHtml+`<div class="card"><div class="card-body"><div style="padding:20px 0;text-align:center;color:#bbb;font-size:13px">아직 저장된 매출 데이터가 없습니다</div></div></div>`;
  const grouped=groupByMonth(history);
  const thisMonthEntry=grouped.find(([m])=>m===currentMonthKey());
  const thisMonthTotal=thisMonthEntry?thisMonthEntry[1].total:0;
  const pct=target>0?Math.min(999,Math.round(thisMonthTotal/target*100)):0;
  return`${targetInputHtml}
  ${target>0?`<div class="card"><div class="card-header"><div class="card-title">${currentMonthKey()} 목표 달성률</div></div><div class="card-body">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
      <span style="font-size:22px;font-weight:700;color:${SHOP_COLOR[shop]}">${pct}%</span>
      <span style="font-size:12px;color:#999">${thisMonthTotal.toLocaleString('ko-KR')}원 / ${target.toLocaleString('ko-KR')}원</span>
    </div>
    <div style="width:100%;height:8px;background:#f0ede8;border-radius:6px;overflow:hidden"><div style="width:${Math.min(100,pct)}%;height:100%;background:${SHOP_COLOR[shop]};border-radius:6px"></div></div>
    ${pct>=100?`<div style="font-size:12px;color:#2d7a3a;margin-top:6px;font-weight:500">🎉 목표 달성!</div>`:`<div style="font-size:12px;color:#999;margin-top:6px">목표까지 ${(target-thisMonthTotal).toLocaleString('ko-KR')}원 남음</div>`}
  </div></div>`:''}
  <div class="card"><div class="card-header"><div class="card-title">${shop}점 · 월별 매출</div></div><div class="card-body">
    ${grouped.map(([month,g])=>{
      const avg=g.days>0?Math.round(g.total/g.days):0;const cvr=g.visitors>0?Math.round(g.buyers/g.visitors*100):0;
      return`<div class="summary-row" style="align-items:flex-start">
        <div><div style="font-size:13px;font-weight:600">${month}${month===currentMonthKey()?' (이번달)':''}</div>
          <div style="font-size:11px;color:#999;margin-top:2px">${g.days}일 입력 · 일평균 ${avg.toLocaleString('ko-KR')}원</div>
          ${g.visitors?`<div style="font-size:11px;color:#999">방문 ${g.visitors}명 · 전환율 ${cvr}%</div>`:''}
        </div>
        <div style="font-size:16px;font-weight:700;color:${SHOP_COLOR[shop]}">${g.total.toLocaleString('ko-KR')}원</div>
      </div>`;}).join('')}
  </div></div>`;
}

function renderChecklist(){

  <p style="font-size:12px;color:#999;margin:-10px 0 14px">${todayDisplay()}</p>

function setChecklistView(v){

    document.getElementById('mc').innerHTML=`<div class="page-title">업무 체크리스트</div><div class="loading">불러오는 중...</div>`;

function renderChecklistMain(shop){

  <div class="card"><div class="card-header"><div class="card-title">🌅 오픈 체크 · ${shop}점</div>
    <span style="font-size:11px;color:${SHOP_COLOR[shop]};font-weight:500">${chk.open.filter(Boolean).length} / ${OPEN_CHECKS.length}</span></div>

function renderAttendance(shop){

  const now=new Date();
  return`<div class="card"><div class="card-header"><div class="card-title">근무 확인 · ${shop}점</div></div><div class="card-body">
    <div class="punch-wrap">
      <div class="punch-time" id="clock">${p2(now.getHours())}:${p2(now.getMinutes())}</div>
      <div class="punch-date">${S.punchIn?`출근 ${S.punchIn}${S.punchOut?' · 퇴근 '+S.punchOut:''}`:' 출근 기록 없음'}</div>
      <button class="punch-btn ${S.clockedIn?'out':''}" onclick="punch()" ${S.punchOut&&S.punchIn?'':''}>${S.clockedIn?'퇴근 기록':S.punchOut?'출근 기록 (재출근)':'출근 기록'}</button>
    </div>
  </div></div>`;}

function renderAttendanceHistory(shop){
  const history=S.attendanceHistory[shop]||[];
  if(!history.length)return`<div class="card"><div class="card-body"><div style="padding:20px 0;text-align:center;color:#bbb;font-size:13px">출퇴근 기록이 없습니다</div></div></div>`;

  return grouped.map(([month,g])=>`<div class="card"><div class="card-header">

      <div class="attend-av" style="background:${SHOP_COLOR[shop]}20;color:${SHOP_COLOR[shop]}">${h.name[0]}</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:500">${h.name} <span style="color:#999;font-weight:400">· ${h.date.split('.').slice(1).join('.')}</span></div>
        <div style="font-size:11px;color:#999">출근 ${h.in||'-'} · 퇴근 ${h.out||'-'}${mins!==null?' · '+fmtMinutes(mins):''}</div></div>
      <span class="abadge ${h.out?'ab-in':'ab-late'}">${h.out?'완료':'근무중'}</span>
    </div>`;}).join('')}
  </div></div>`).join('');
}

  ${S.showNoticeForm?`<div class="notice-write">
    <select onchange="S.newNotice.target=this.value"><option value="all">전체 공지</option><option value="도산">도산점만</option><option value="한남">한남점만</option><option value="서촌">서촌점만</option></select>

    <button class="cta-btn sec" onclick="toggleNoticeForm()">취소</button>
  </div>`:''}`:''}
  <div class="card"><div class="card-body">
    ${!S.noticesLoaded?`<div class="loading">불러오는 중...</div>`:
    filtered.length?filtered.map(n=>`<div class="notice-item"><div class="notice-top">
      <span class="nbadge ${badgeClass[n.badge]||'notice'}">${n.badge==='urgent'?'주의':n.badge==='notice'?'공지':n.target==='all'?'전체':n.target+'점'}</span>

  </div></div>`;}

function startClock(){
  clearInterval(window._clk);
  window._clk=setInterval(()=>{
    const el=document.getElementById('clock');
    if(!el){clearInterval(window._clk);return;}
    const now=new Date();el.textContent=`${p2(now.getHours())}:${p2(now.getMinutes())}`;
  },1000);
}
render();
</script>
